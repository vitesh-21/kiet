<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Diploma System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-width: 230px;
            --sidebar-bg: #222d32;
            --topbar-bg: #00a65a;
            --main-bg: #ecf0f5;
        }

        body {
            margin: 0;
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--main-bg);
            display: flex;
            transition: all 0.3s;
        }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            min-height: 100vh;
            color: white;
            position: fixed;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        /* This class hides the sidebar */
        .sidebar.collapsed {
            left: calc(var(--sidebar-width) * -1);
        }

        .brand { background-color: #1a2226; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #b8c7ce;
            text-decoration: none;
            transition: 0.2s;
        }

        .nav-item:hover { background: #1e282c; color: #fff; border-left: 3px solid #3c8dbc; }
        .nav-item i { margin-right: 10px; width: 20px; }

        /* CONTENT */
        .content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            transition: all 0.3s ease;
            width: calc(100% - var(--sidebar-width));
        }

        /* This class makes content full-width when sidebar is gone */
        .content.full-width {
            margin-left: 0;
            width: 100%;
        }

        .top-nav {
            background-color: var(--topbar-bg);
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
        }

        .menu-toggle { cursor: pointer; font-size: 20px; }

        .container { padding: 20px; }

        /* STAT CARDS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .stat-card {
            padding: 20px;
            border-radius: 3px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bg-cyan { background-color: #00c0ef; }
        .bg-green { background-color: #00a65a; }
        .bg-orange { background-color: #f39c12; }

        /* MOBILE VIEW */
        @media (max-width: 768px) {
            .sidebar { left: -230px; }
            .content { margin-left: 0; width: 100%; }
            .sidebar.show-mobile { left: 0; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">DIPLOMA ADMIN</div>
        <div style="margin-top: 20px;">
            <a href="#" class="nav-item"><i class="fa fa-dashboard"></i> Dashboard</a>
            <a href="#" class="nav-item"><i class="fa fa-users"></i> Students</a>
            <a href="#" class="nav-item"><i class="fa fa-book"></i> Courses</a>
            <a href="login.html" class="nav-item"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
    </div>

    <div class="content" id="content">
        <nav class="top-nav">
            <div style="display: flex; align-items: center;">
                <i class="fa fa-bars menu-toggle" id="toggleBtn"></i>
                <span style="margin-left: 15px;">Master Student Information System</span>
            </div>
            <div>Welcome, Admin</div>
        </nav>

        <div class="container">
            <h2>Overview Dashboard</h2>

            <div class="stats-grid">
                <div class="stat-card bg-cyan">
                    <div>
                        <h3 id="studentCount">0</h3>
                        <p>TOTAL STUDENTS</p>
                    </div>
                    <i class="fa fa-users fa-3x" style="opacity: 0.3;"></i>
                </div>

                <div class="stat-card bg-green">
                    <div>
                        <h3>5</h3>
                        <p>ACTIVE COURSES</p>
                    </div>
                    <i class="fa fa-graduation-cap fa-3x" style="opacity: 0.3;"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('toggleBtn');
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');

        toggleBtn.addEventListener('click', function() {
            if (window.innerWidth > 768) {
                // Desktop Toggle
                sidebar.classList.toggle('collapsed');
                content.classList.toggle('full-width');
            } else {
                // Mobile Toggle
                sidebar.classList.toggle('show-mobile');
            }
        });

        // Function to simulate dynamic data in HTML
        window.onload = function() {
            // If you are using your signup.php, you can't easily get the count here
            // but for now, we will set a placeholder number.
            document.getElementById('studentCount').innerText = "12";
        };
    </script>
</body>
</html>
