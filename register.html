<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Sign Up</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #ecf0f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .box {
        background: white;
        padding: 30px;
        width: 420px;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #00a65a;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
        margin-top: 10px;
    }

    button:hover { background: #008d4c; }

    .alert {
        margin-bottom: 15px;
        font-size: 14px;
        padding: 10px;
        border-radius: 4px;
    }

    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }

    #unitPreview {
        background: #f4f6f9;
        padding: 10px;
        border-radius: 4px;
        font-size: 14px;
        margin-top: 5px;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Student Sign Up</h2>

    <div id="message"></div>

    <form id="signupForm">

        <input type="text" id="full_name" placeholder="Student Name" required>

        <input type="text" id="reg_number" placeholder="Admission Number" required>

        <input type="email" id="email" placeholder="Email" required>

        <input type="password" id="password" placeholder="Password" required>

        <select id="course" required>
            <option value="" disabled selected>Select Course</option>
        </select>

        <div id="unitPreview">Units will appear here...</div>

        <select id="year" required>
            <option value="" disabled selected>Select Year</option>
            <option value="1">Year 1</option>
            <option value="2">Year 2</option>
        </select>

        <select id="semester" required>
            <option value="" disabled selected>Select Semester</option>
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
        </select>

        <button type="submit">Register Student</button>

    </form>
</div>

<script>
const form = document.getElementById('signupForm');
const messageDiv = document.getElementById('message');
const courseSelect = document.getElementById('course');
const unitPreview = document.getElementById('unitPreview');

// Load courses from localStorage (from Admin dashboard)
function loadCourses() {
    let courses = JSON.parse(localStorage.getItem('courses') || '[]');
    courseSelect.innerHTML = '<option value="" disabled selected>Select Course</option>';
    courses.forEach(course => {
        let option = document.createElement('option');
        option.value = course.name;
        option.textContent = course.name;
        courseSelect.appendChild(option);
    });
}
loadCourses();

// Show units dynamically when course is selected
courseSelect.addEventListener('change', function(){
    let courses = JSON.parse(localStorage.getItem('courses') || '[]');
    let selected = courses.find(c => c.name === this.value);
    if(selected){
        unitPreview.innerHTML = "<b>Units:</b> " + selected.units.join(", ");
    } else {
        unitPreview.innerHTML = "Units will appear here...";
    }
});

// Form submission
form.addEventListener('submit', function(e){
    e.preventDefault();

    const full_name = document.getElementById('full_name').value.trim();
    const reg_number = document.getElementById('reg_number').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const course = courseSelect.value;
    const year = document.getElementById('year').value;
    const semester = document.getElementById('semester').value;

    if (!full_name || !reg_number || !email || !password || !course || !year || !semester) {
        showMessage('Please fill all fields', 'error');
        return;
    }

    if(!validateEmail(email)){
        showMessage('Invalid email address', 'error');
        return;
    }

    if(password.length < 6){
        showMessage('Password must be at least 6 characters', 'error');
        return;
    }

    let students = JSON.parse(localStorage.getItem('students') || '[]');

    if(students.some(s => s.reg_number === reg_number)){
        showMessage('Admission Number already exists!', 'error');
        return;
    }

    // Assign units automatically from selected course
    let courses = JSON.parse(localStorage.getItem('courses') || '[]');
    let selectedCourse = courses.find(c => c.name === course);

    students.push({
        full_name,
        reg_number,
        email,
        password,
        course,
        year,
        semester,
        units: selectedCourse ? selectedCourse.units : []
    });

    localStorage.setItem('students', JSON.stringify(students));
    showMessage('Student registered successfully!', 'success');
    form.reset();
    unitPreview.innerHTML = "Units will appear here...";
});

function showMessage(msg, type){
    messageDiv.innerHTML = `<div class="alert ${type}">${msg}</div>`;
    setTimeout(() => messageDiv.innerHTML = '', 4000);
}

function validateEmail(email) {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return re.test(email.toLowerCase());
}
</script>

</body>
</html>
