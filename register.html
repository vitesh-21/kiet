<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Sign Up</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #ecf0f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }
    .box {
        background: white;
        padding: 30px;
        width: 400px;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    input, select {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    button {
        width: 100%;
        padding: 12px;
        background: #00a65a;
        border: none;
        color: white;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
        margin-top: 10px;
    }
    button:hover { background: #008d4c; }
    .alert {
        margin-bottom: 15px;
        font-size: 14px;
        padding: 10px;
        border-radius: 4px;
    }
    .alert.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
</style>
</head>
<body>

<div class="box">
    <h2>Student Sign Up</h2>
    <div id="message"></div>
    <form id="signupForm">
        <input type="text" id="full_name" placeholder="Full Name" required>
        <input type="text" id="reg_number" placeholder="Registration Number" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <select id="course" required>
            <option value="" disabled selected>Select Your Course</option>
            <option value="Information Technology">Information Technology</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Business Information Technology">Business Information Technology</option>
            <option value="Cyber Security">Cyber Security</option>
            <option value="Software Engineering">Software Engineering</option>
        </select>
        
        <select id="year" required>
            <option value="" disabled selected>Select Year</option>
            <option value="1">Year 1</option>
            <option value="2">Year 2</option>
        </select>
        
        <select id="semester" required>
            <option value="" disabled selected>Select Semester</option>
            <option value="1">Semester 1</option>
            <option value="2">Semester 2</option>
        </select>
        
        <button type="submit">Sign Up</button>
    </form>
</div>

<script>
const form = document.getElementById('signupForm');
const messageDiv = document.getElementById('message');

form.addEventListener('submit', function(e){
    e.preventDefault(); // prevent page reload

    // Get form values
    const full_name = document.getElementById('full_name').value.trim();
    const reg_number = document.getElementById('reg_number').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const course = document.getElementById('course').value;
    const year = document.getElementById('year').value;
    const semester = document.getElementById('semester').value;

    // Basic validation
    if (!full_name || !reg_number || !email || !password || !course || !year || !semester) {
        showMessage('Please fill in all fields', 'error');
        return;
    }

    if (!validateEmail(email)) {
        showMessage('Invalid email address', 'error');
        return;
    }

    if (password.length < 6) {
        showMessage('Password must be at least 6 characters', 'error');
        return;
    }

    // Save to localStorage (simulate registration)
    let students = JSON.parse(localStorage.getItem('students') || '[]');

    // Check duplicate registration number
    if(students.some(s => s.reg_number === reg_number)){
        showMessage('Registration Number already exists!', 'error');
        return;
    }

    students.push({ full_name, reg_number, email, password, course, year, semester });
    localStorage.setItem('students', JSON.stringify(students));

    showMessage('Student registered successfully!', 'success');

    // Reset form
    form.reset();
});

// Helper functions
function showMessage(msg, type){
    messageDiv.innerHTML = `<div class="alert ${type}">${msg}</div>`;
    setTimeout(() => messageDiv.innerHTML = '', 4000);
}

function validateEmail(email) {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return re.test(email.toLowerCase());
}
</script>

</body>
</html>
