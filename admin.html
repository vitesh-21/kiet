<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Diploma System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #222d32;
            --sidebar-hover: #1e282c;
            --topbar-bg: #00a65a;
            --main-bg: #ecf0f5;
            --text-gray: #b8c7ce;
            --sidebar-width: 230px;
        }

        body {
            margin: 0;
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--main-bg);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar.collapsed { transform: translateX(-100%); }

        .brand {
            background-color: #1a2226;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .user-panel {
            padding: 15px;
            display: flex;
            align-items: center;
            background: #1a2226;
        }

        .user-panel i { font-size: 30px; margin-right: 10px; color: #dbdbdb; }

        .nav-label {
            padding: 10px 20px;
            font-size: 12px;
            color: #4b646f;
            background: #1a2226;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--text-gray);
            text-decoration: none;
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--sidebar-hover);
            color: #fff;
            border-left-color: #3c8dbc;
        }

        .nav-item i { margin-right: 10px; width: 20px; }

        /* --- CONTENT AREA --- */
        .content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            width: 100%;
            transition: margin-left 0.3s ease;
        }

        .content.expanded { margin-left: 0; }

        .top-nav {
            background-color: var(--topbar-bg);
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
        }

        .menu-toggle { cursor: pointer; font-size: 20px; }

        .container { padding: 20px; }

        .info-box {
            background: white;
            padding: 20px;
            border-top: 3px solid #d2d6de;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
            margin-top: 10px;
        }

        /* Dashboard Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 3px;
        }

        .bg-cyan { background: #00c0ef; }
        .bg-green { background: #00a65a; }
        .bg-orange { background: #f39c12; }
        .bg-blue { background: #3c8dbc; }

        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .btn { background: #00a65a; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .content { margin-left: 0 !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">DIPLOMA ADMIN</div>
        <div class="user-panel">
            <i class="fa fa-user-circle"></i>
            <div>
                <p style="margin:0; font-size:14px;">System Admin</p>
                <small style="color:#44dd44;">● Online</small>
            </div>
        </div>

        <div class="nav-label">MAIN NAVIGATION</div>
        <a class="nav-item active" data-page="dashboard"><i class="fa fa-dashboard"></i> Dashboard</a>
        <a class="nav-item" data-page="students"><i class="fa fa-users"></i> Students</a>
        <a class="nav-item" data-page="courses"><i class="fa fa-graduation-cap"></i> Courses</a>
        <a class="nav-item" data-page="units"><i class="fa fa-book"></i> Units</a>
        <a class="nav-item" data-page="attendance"><i class="fa fa-calendar-check"></i> Attendance</a>
        <a class="nav-item" data-page="marks"><i class="fa fa-poll"></i> Marks</a>
        <a class="nav-item" data-page="fees"><i class="fa fa-money-bill"></i> Fees</a>

        <div class="nav-label">ACTIONS</div>
        <a class="nav-item" data-page="register"><i class="fa fa-plus-circle"></i> Register Student</a>
        <a class="nav-item" onclick="clearData()" style="color:#ff7675;"><i class="fa fa-trash"></i> Reset System</a>
    </div>

    <div class="content" id="content">
        <nav class="top-nav">
            <div style="display: flex; align-items: center;">
                <i class="fa fa-bars menu-toggle" id="menuBtn"></i>
                <span style="margin-left:15px;">Student Information System</span>
            </div>
            <div>Admin <i class="fa fa-user-shield"></i></div>
        </nav>

        <div class="container" id="page-container">
            </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');
        const menuBtn = document.getElementById('menuBtn');
        const pageContainer = document.getElementById('page-container');

        // --- 1. SIDEBAR TOGGLE ---
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('collapsed');
                content.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('mobile-open');
            }
        });

        document.addEventListener('click', () => {
            sidebar.classList.remove('mobile-open');
        });

        // --- 2. NAVIGATION LOGIC (Universal) ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                const page = this.getAttribute('data-page');
                if(!page) return;

                // Update Active Class
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');

                renderPage(page);
            });
        });

        // --- 3. PAGE RENDERER ---
        function renderPage(pageId) {
            let html = "";

            switch(pageId) {
                case 'dashboard':
                    const students = JSON.parse(localStorage.getItem('sys_students')) || [];
                    const totalFees = students.reduce((sum, s) => sum + s.fee, 0);
                    html = `
                        <h2>Overview Dashboard</h2>
                        <div class="stats-grid">
                            <div class="stat-card bg-cyan"><div><h3>${students.length}</h3><p>TOTAL STUDENTS</p></div><i class="fa fa-users fa-3x"></i></div>
                            <div class="stat-card bg-green"><div><h3>10</h3><p>ACTIVE COURSES</p></div><i class="fa fa-graduation-cap fa-3x"></i></div>
                            <div class="stat-card bg-orange"><div><h3>52</h3><p>UNITS</p></div><i class="fa fa-file-lines fa-3x"></i></div>
                            <div class="stat-card bg-blue"><div><h3>KES ${totalFees.toLocaleString()}</h3><p>FEES COLLECTED</p></div><i class="fa fa-money-check-dollar fa-3x"></i></div>
                        </div>
                        <div class="info-box"><h4>Quick Stats</h4><p>System is running on Local Storage mode.</p></div>
                    `;
                    break;

                case 'students':
                    const list = JSON.parse(localStorage.getItem('sys_students')) || [];
                    html = `<h2>Student Directory</h2><div class="info-box">`;
                    if(list.length === 0) {
                        html += `<p>No students found.</p>`;
                    } else {
                        html += `<table style="width:100%; border-collapse:collapse;">
                            <tr style="background:#eee; text-align:left;"><th style="padding:10px;">Name</th><th style="padding:10px;">Fees Paid</th></tr>`;
                        list.forEach(s => {
                            html += `<tr style="border-bottom:1px solid #ddd;"><td style="padding:10px;">${s.name}</td><td style="padding:10px;">KES ${s.fee.toLocaleString()}</td></tr>`;
                        });
                        html += `</table>`;
                    }
                    html += `</div>`;
                    break;

                case 'register':
                    html = `
                        <h2>Register New Student</h2>
                        <div class="info-box">
                            <label>Full Name</label><input type="text" id="regName" placeholder="Enter student name">
                            <label>Fee Deposit (KES)</label><input type="number" id="regFee" placeholder="Enter amount">
                            <button class="btn" onclick="saveStudent()">Register Student</button>
                        </div>
                    `;
                    break;

                default:
                    // This handles Courses, Units, Marks, etc.
                    html = `<h2>${pageId.toUpperCase()}</h2><div class="info-box"><p>The <strong>${pageId}</strong> module is currently under development.</p></div>`;
            }

            pageContainer.innerHTML = html;
        }

        // --- 4. DATA LOGIC ---
        function saveStudent() {
            const name = document.getElementById('regName').value;
            const fee = document.getElementById('regFee').value;

            if(!name || !fee) return alert("Please fill in all fields");

            const students = JSON.parse(localStorage.getItem('sys_students')) || [];
            students.push({ name, fee: parseFloat(fee) });
            localStorage.setItem('sys_students', JSON.stringify(students));

            alert("Student Registered!");
            renderPage('dashboard');
            // Reset active link to dashboard
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            document.querySelector('[data-page="dashboard"]').classList.add('active');
        }

        function clearData() {
            if(confirm("Wipe all data?")) {
                localStorage.removeItem('sys_students');
                location.reload();
            }
        }

        // Initialize first view
        renderPage('dashboard');
    </script>
</body>
</html>
