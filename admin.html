<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Diploma System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #222d32;
            --sidebar-hover: #1e282c;
            --topbar-bg: #00a65a;
            --main-bg: #ecf0f5;
            --text-gray: #b8c7ce;
            --sidebar-width: 230px;
        }

        body { margin: 0; font-family: 'Source Sans Pro', sans-serif; background-color: var(--main-bg); display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); background-color: var(--sidebar-bg); color: white; position: fixed; top: 0; left: 0; bottom: 0; transition: 0.3s; z-index: 1000; }
        .sidebar.collapsed { transform: translateX(-100%); }
        .brand { background-color: #1a2226; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        .nav-label { padding: 10px 20px; font-size: 12px; color: #4b646f; background: #1a2226; }
        .nav-item { display: flex; align-items: center; padding: 12px 20px; color: var(--text-gray); text-decoration: none; cursor: pointer; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: #fff; border-left-color: #3c8dbc; }
        .nav-item i { margin-right: 10px; width: 20px; }

        /* --- CONTENT --- */
        .content { margin-left: var(--sidebar-width); flex-grow: 1; transition: 0.3s; width: 100%; }
        .content.expanded { margin-left: 0; }
        .top-nav { background: var(--topbar-bg); height: 50px; display: flex; align-items: center; padding: 0 20px; color: white; justify-content: space-between; }
        
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-top: 3px solid #d2d6de; box-shadow: 0 1px 1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Form Styling */
        .form-container { display: flex; flex-direction: column; gap: 10px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 10px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 2px; width: 100%; box-sizing: border-box; }
        
        .btn-add { background: #00a65a; color: white; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 2px; align-self: flex-start; }
        .btn-add:hover { background: #008d4c; }

        /* Table Styling */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 600px; }
        th { text-align: left; background: #f4f4f4; padding: 12px; border-bottom: 2px solid #eee; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }

        /* Dashboard Stat Boxes */
        .dash-box { color: white; padding: 20px; border-radius: 3px; display: flex; justify-content: space-between; align-items: center; }
        .dash-box h3 { margin: 0; font-size: 28px; }
        .dash-box p { margin: 0; font-weight: bold; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .content { margin-left: 0 !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">DIPLOMA ADMIN</div>
        <div class="nav-label">MAIN NAVIGATION</div>
        <a class="nav-item active" onclick="showTab('dashboard', this)"><i class="fa fa-dashboard"></i> Dashboard</a>
        <a class="nav-item" onclick="showTab('students', this)"><i class="fa fa-users"></i> Students</a>
        <a class="nav-item" onclick="showTab('courses', this)"><i class="fa fa-graduation-cap"></i> Courses</a>
        <a class="nav-item" onclick="showTab('units', this)"><i class="fa fa-book"></i> Units</a>
        <a class="nav-item" onclick="showTab('fees', this)"><i class="fa fa-money-bill"></i> Fees</a>
        <div class="nav-label">ACTIONS</div>
        <a class="nav-item" onclick="resetSystem()" style="color:#ff7675;"><i class="fa fa-trash"></i> Reset All Data</a>
    </div>

    <div class="content" id="content">
        <nav class="top-nav">
            <i class="fa fa-bars" style="cursor:pointer" id="menuBtn"></i>
            <span>System Manager</span>
            <div>Admin <i class="fa fa-circle" style="color:#4f4; font-size:10px"></i></div>
        </nav>

        <div class="container">
            <h2 id="pageTitle">DASHBOARD</h2>
            
            <div id="addFormContainer" class="card" style="display:none;">
                <div id="dynamicFields" class="form-container">
                    </div>
            </div>

            <div class="card">
                <div class="table-responsive" id="tableArea">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'dashboard';
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');

        document.getElementById('menuBtn').onclick = (e) => {
            e.stopPropagation();
            if(window.innerWidth > 768) {
                sidebar.classList.toggle('collapsed');
                content.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('mobile-open');
            }
        };

        function showTab(tab, element) {
            currentTab = tab;
            document.getElementById('pageTitle').innerText = tab.toUpperCase();
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            const formBox = document.getElementById('addFormContainer');
            
            if(tab === 'dashboard') {
                formBox.style.display = 'none';
                renderDashboard();
            } else {
                formBox.style.display = 'block';
                setupForm(tab);
                renderTable(tab);
            }
            if(window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
        }

        function setupForm(tab) {
            const container = document.getElementById('dynamicFields');
            
            if(tab === 'students') {
                container.innerHTML = `
                    <div class="form-row">
                        <div class="form-group"><label>Full Name</label><input type="text" id="f1" placeholder="Full Name"></div>
                        <div class="form-group"><label>Reg Number</label><input type="text" id="f2" placeholder="DIP/000/2024"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="f3" placeholder="email@test.com"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Password</label><input type="password" id="f4" placeholder="Min 6 chars"></div>
                        <div class="form-group">
                            <label>Course</label>
                            <select id="f5">
                                <option value="Information Technology">Information Technology</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Cyber Security">Cyber Security</option>
                                <option value="Software Engineering">Software Engineering</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Year</label>
                            <select id="f6"><option value="1">Year 1</option><option value="2">Year 2</option></select>
                        </div>
                        <div class="form-group">
                            <label>Semester</label>
                            <select id="f7"><option value="1">Semester 1</option><option value="2">Semester 2</option></select>
                        </div>
                    </div>
                    <button class="btn-add" onclick="handleSave()">Register Student</button>
                `;
            } else {
                // Simple form for other tabs
                let label1 = tab === 'courses' ? "Course Title" : (tab === 'fees' ? "Student Name" : "Name");
                let label2 = tab === 'courses' ? "Duration" : (tab === 'fees' ? "Amount Paid" : "Code/Detail");
                container.innerHTML = `
                    <div class="form-row">
                        <div class="form-group"><label>${label1}</label><input type="text" id="f1"></div>
                        <div class="form-group"><label>${label2}</label><input type="text" id="f2"></div>
                    </div>
                    <button class="btn-add" onclick="handleSave()">Add ${tab.slice(0,-1)}</button>
                `;
            }
        }

        function handleSave() {
            const storageKey = currentTab === 'students' ? 'students' : 'db_' + currentTab;
            const data = JSON.parse(localStorage.getItem(storageKey)) || [];
            
            let entry = {};
            if(currentTab === 'students') {
                entry = {
                    full_name: document.getElementById('f1').value,
                    reg_number: document.getElementById('f2').value,
                    email: document.getElementById('f3').value,
                    password: document.getElementById('f4').value,
                    course: document.getElementById('f5').value,
                    year: document.getElementById('f6').value,
                    semester: document.getElementById('f7').value
                };
                if(!entry.full_name || !entry.reg_number) return alert("Please fill Name and Reg No");
            } else {
                entry = { col1: document.getElementById('f1').value, col2: document.getElementById('f2').value };
                if(!entry.col1 || !entry.col2) return alert("Please fill both fields");
            }

            data.push(entry);
            localStorage.setItem(storageKey, JSON.stringify(data));
            setupForm(currentTab); // Clear form
            renderTable(currentTab);
        }

        function renderTable(tab) {
            const storageKey = tab === 'students' ? 'students' : 'db_' + tab;
            const data = JSON.parse(localStorage.getItem(storageKey)) || [];
            const area = document.getElementById('tableArea');

            if(data.length === 0) {
                area.innerHTML = `<p style="color:#888; padding:20px;">No records found.</p>`;
                return;
            }

            if(tab === 'students') {
                let html = `<table><tr><th>Name</th><th>Reg No</th><th>Email</th><th>Course</th><th>Year/Sem</th></tr>`;
                data.forEach(s => {
                    html += `<tr><td>${s.full_name}</td><td>${s.reg_number}</td><td>${s.email}</td><td>${s.course}</td><td>Y${s.year} S${s.semester}</td></tr>`;
                });
                area.innerHTML = html + `</table>`;
            } else {
                let h1 = tab === 'courses' ? "Course" : "Name";
                let h2 = tab === 'courses' ? "Duration" : "Detail";
                let html = `<table><tr><th>${h1}</th><th>${h2}</th></tr>`;
                data.forEach(item => { html += `<tr><td>${item.col1}</td><td>${item.col2}</td></tr>`; });
                area.innerHTML = html + `</table>`;
            }
        }

        function renderDashboard() {
            const sCount = (JSON.parse(localStorage.getItem('students')) || []).length;
            const cCount = (JSON.parse(localStorage.getItem('db_courses')) || []).length;
            const uCount = (JSON.parse(localStorage.getItem('db_units')) || []).length;

            document.getElementById('tableArea').innerHTML = `
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px;">
                    <div class="dash-box" style="background:#00c0ef;"><div><h3>${sCount}</h3><p>STUDENTS</p></div><i class="fa fa-users fa-3x" style="opacity:0.2"></i></div>
                    <div class="dash-box" style="background:#00a65a;"><div><h3>${cCount}</h3><p>COURSES</p></div><i class="fa fa-graduation-cap fa-3x" style="opacity:0.2"></i></div>
                    <div class="dash-box" style="background:#f39c12;"><div><h3>${uCount}</h3><p>UNITS</p></div><i class="fa fa-book fa-3x" style="opacity:0.2"></i></div>
                </div>
            `;
        }

        function resetSystem() {
            if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); }
        }

        renderDashboard();
    </script>
</body>
</html>
