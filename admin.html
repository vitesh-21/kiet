<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Diploma System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #222d32;
            --sidebar-hover: #1e282c;
            --topbar-bg: #00a65a;
            --main-bg: #ecf0f5;
            --text-gray: #b8c7ce;
            --sidebar-width: 230px;
        }

        body { margin: 0; font-family: 'Source Sans Pro', sans-serif; background-color: var(--main-bg); display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); background-color: var(--sidebar-bg); color: white; position: fixed; top: 0; left: 0; bottom: 0; transition: 0.3s; z-index: 1000; }
        .sidebar.collapsed { transform: translateX(-100%); }
        .brand { background-color: #1a2226; padding: 15px; text-align: center; font-weight: bold; }
        .nav-label { padding: 10px 20px; font-size: 12px; color: #4b646f; background: #1a2226; }
        .nav-item { display: flex; align-items: center; padding: 12px 20px; color: var(--text-gray); text-decoration: none; cursor: pointer; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: #fff; border-left-color: #3c8dbc; }
        .nav-item i { margin-right: 10px; width: 20px; }

        /* --- CONTENT --- */
        .content { margin-left: var(--sidebar-width); flex-grow: 1; transition: 0.3s; width: 100%; }
        .content.expanded { margin-left: 0; }
        .top-nav { background: var(--topbar-bg); height: 50px; display: flex; align-items: center; padding: 0 20px; color: white; justify-content: space-between; }
        
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-top: 3px solid #d2d6de; box-shadow: 0 1px 1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        /* Form Styling */
        .form-inline { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .form-group { flex: 1; min-width: 200px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 2px; box-sizing: border-box; height: 35px; }
        
        .btn-add { background: #00a65a; color: white; border: none; padding: 0 20px; cursor: pointer; font-weight: bold; border-radius: 2px; height: 35px; }
        .btn-add:hover { background: #008d4c; }

        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th { text-align: left; background: #f4f4f4; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .content { margin-left: 0 !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">DIPLOMA ADMIN</div>
        <div class="nav-label">MAIN NAVIGATION</div>
        <a class="nav-item active" onclick="showTab('dashboard', this)"><i class="fa fa-dashboard"></i> Dashboard</a>
        <a class="nav-item" onclick="showTab('students', this)"><i class="fa fa-users"></i> Students</a>
        <a class="nav-item" onclick="showTab('courses', this)"><i class="fa fa-graduation-cap"></i> Courses</a>
        <a class="nav-item" onclick="showTab('units', this)"><i class="fa fa-book"></i> Units</a>
        <a class="nav-item" onclick="showTab('attendance', this)"><i class="fa fa-calendar-check"></i> Attendance</a>
        <a class="nav-item" onclick="showTab('marks', this)"><i class="fa fa-poll"></i> Marks</a>
        <a class="nav-item" onclick="showTab('fees', this)"><i class="fa fa-money-bill"></i> Fees</a>
        <div class="nav-label">ACTIONS</div>
        <a class="nav-item" onclick="resetSystem()" style="color:#ff7675;"><i class="fa fa-trash"></i> Reset All Data</a>
    </div>

    <div class="content" id="content">
        <nav class="top-nav">
            <i class="fa fa-bars" style="cursor:pointer" id="menuBtn"></i>
            <span>System Manager</span>
            <div>Admin <i class="fa fa-circle" style="color:#4f4; font-size:10px"></i></div>
        </nav>

        <div class="container">
            <h2 id="pageTitle">Dashboard</h2>
            
            <div id="addFormContainer" class="card" style="display:none;">
                <div class="form-inline" id="mainForm">
                    <div class="form-group">
                        <label id="label1">Name</label>
                        <input type="text" id="input1" placeholder="">
                    </div>
                    <div class="form-group">
                        <label id="label2">Details</label>
                        <input type="text" id="input2" placeholder="">
                    </div>
                    <button class="btn-add" onclick="handleSave()">Add Entry</button>
                </div>
            </div>

            <div class="card">
                <div id="tableArea">
                    <p>Welcome! Click a tab to start managing data.</p>
                </div>
            </div>
        </div>
    </div>

<script>
let currentTab = 'dashboard';
const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

document.getElementById('menuBtn').onclick = (e) => {
    e.stopPropagation();
    if(window.innerWidth > 768) {
        sidebar.classList.toggle('collapsed');
        content.classList.toggle('expanded');
    } else {
        sidebar.classList.toggle('mobile-open');
    }
};

function showTab(tab, element) {
    currentTab = tab;
    document.getElementById('pageTitle').innerText = tab.toUpperCase();

    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    if(element) element.classList.add('active');

    const formBox = document.getElementById('addFormContainer');

    if(tab === 'dashboard') {
        formBox.style.display = 'none';
        renderDashboard();
    } else {
        formBox.style.display = 'block';
        setupForm(tab);
        renderTable(tab);
    }

    if(window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
}

function setupForm(tab) {
    const l1 = document.getElementById('label1');
    const l2 = document.getElementById('label2');
    const i1 = document.getElementById('input1');
    const i2 = document.getElementById('input2');

    i1.value = '';
    i2.value = '';

    // Remove existing custom dropdown wrapper if it exists
    const existingDropdown = document.getElementById('extraFieldWrapper');
    if(existingDropdown) existingDropdown.remove();

    if(tab === 'students') {
        l1.innerText = "Student Name";
        l2.innerText = "Admission No";
        i1.placeholder = "Ex: John Doe";
        i2.placeholder = "Ex: DIP/001";

        const div = document.createElement('div');
        div.className = "form-group";
        div.id = "extraFieldWrapper";
        div.innerHTML = `
            <label>Course</label>
            <select id="courseSelect"></select>
        `;
        document.getElementById('mainForm').insertBefore(div, document.querySelector('.btn-add'));
        loadCoursesIntoDropdown();
    } else if(tab === 'courses') {
        l1.innerText="Course Title";
        l2.innerText="Duration";
        i1.placeholder="Ex: IT Diploma";
        i2.placeholder="Ex: 2 Years";
    } else if(tab === 'units') {
        l1.innerText="Unit Name";
        l2.innerText="Unit Code";
        i1.placeholder="Ex: Programming I";
        i2.placeholder="Ex: ICT101";
    } else if(tab === 'fees') {
        l1.innerText="Student Name";
        l2.innerText="Amount Paid (KES)";
        i1.placeholder="Ex: Jane Smith";
        i2.placeholder="Ex: 5000";
    } else {
        l1.innerText="Title";
        l2.innerText="Description";
    }
}

function loadCoursesIntoDropdown() {
    const courses = JSON.parse(localStorage.getItem('db_courses')) || [];
    const select = document.getElementById('courseSelect');
    if(!select) return;

    select.innerHTML = '<option value="">-- Select Course --</option>';
    courses.forEach(course => {
        const option = document.createElement('option');
        option.value = course.col1;
        option.textContent = course.col1;
        select.appendChild(option);
    });
}

function handleSave() {
    if(currentTab === 'students'){
        const name = document.getElementById('input1').value;
        const admission = document.getElementById('input2').value;
        const course = document.getElementById('courseSelect').value;

        if(!name || !admission || !course){
            alert("Please fill in Student Name, Admission No, and select a Course!");
            return;
        }

        const students = JSON.parse(localStorage.getItem('db_students')) || [];
        // Map current units to the student automatically
        const units = JSON.parse(localStorage.getItem('db_units')) || [];

        students.push({
            name: name,
            admission: admission,
            course: course,
            units: units.length > 0 ? units.map(u => u.col1) : ["No units assigned"]
        });

        localStorage.setItem('db_students', JSON.stringify(students));
        document.getElementById('input1').value = '';
        document.getElementById('input2').value = '';
        renderTable('students');
        return;
    }

    const val1 = document.getElementById('input1').value;
    const val2 = document.getElementById('input2').value;

    if(!val1 || !val2) return alert("Please fill both fields!");

    const storageKey = 'db_' + currentTab;
    const data = JSON.parse(localStorage.getItem(storageKey)) || [];
    data.push({ col1: val1, col2: val2 });
    localStorage.setItem(storageKey, JSON.stringify(data));

    document.getElementById('input1').value = '';
    document.getElementById('input2').value = '';
    renderTable(currentTab);
}

function renderTable(tab) {
    const area = document.getElementById('tableArea');

    if(tab === 'students'){
        const data = JSON.parse(localStorage.getItem('db_students')) || [];
        if(data.length === 0){
            area.innerHTML = `<p>No students found. Add one above.</p>`;
            return;
        }

        let html = `<table>
            <tr><th>Name</th><th>Admission</th><th>Course</th><th>Units</th></tr>`;
        data.forEach(s=>{
            html += `<tr>
                <td>${s.name}</td>
                <td>${s.admission}</td>
                <td>${s.course}</td>
                <td><small>${s.units.join(', ')}</small></td>
            </tr>`;
        });
        area.innerHTML = html + `</table>`;
        return;
    }

    const data = JSON.parse(localStorage.getItem('db_' + tab)) || [];
    if(data.length === 0) {
        area.innerHTML = `<p>No records found for ${tab}.</p>`;
        return;
    }

    let html = `<table>
        <tr>
            <th>${document.getElementById('label1').innerText}</th>
            <th>${document.getElementById('label2').innerText}</th>
        </tr>`;
    data.forEach(item => {
        html += `<tr><td>${item.col1}</td><td>${item.col2}</td></tr>`;
    });
    area.innerHTML = html + `</table>`;
}

function renderDashboard() {
    const sCount = (JSON.parse(localStorage.getItem('db_students')) || []).length;
    const cCount = (JSON.parse(localStorage.getItem('db_courses')) || []).length;
    const uCount = (JSON.parse(localStorage.getItem('db_units')) || []).length;

    document.getElementById('tableArea').innerHTML = `
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px;">
            <div style="background:#00c0ef; color:white; padding:20px; border-radius:3px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <h3 style="margin:0">${sCount}</h3>
                <p style="margin:0">Registered Students</p>
            </div>
            <div style="background:#00a65a; color:white; padding:20px; border-radius:3px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <h3 style="margin:0">${cCount}</h3>
                <p style="margin:0">Available Courses</p>
            </div>
             <div style="background:#f39c12; color:white; padding:20px; border-radius:3px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                <h3 style="margin:0">${uCount}</h3>
                <p style="margin:0">Total Units</p>
            </div>
        </div>
    `;
}

function resetSystem() {
    if(confirm("Are you sure? This will wipe all students, courses, and settings.")) {
        localStorage.clear();
        location.reload();
    }
}

// Default view
renderDashboard();
</script>
</body>
</html>
