<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Diploma System</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --sidebar-bg: #222d32; --sidebar-hover: #1e282c; --topbar-bg: #00a65a; --main-bg: #ecf0f5; --text-gray: #b8c7ce; --sidebar-width: 230px; }
        body { margin: 0; font-family: 'Source Sans Pro', sans-serif; background-color: var(--main-bg); display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background-color: var(--sidebar-bg); color: white; position: fixed; top: 0; left: 0; bottom: 0; transition: 0.3s; z-index: 1000; }
        .sidebar.collapsed { transform: translateX(-100%); }
        .brand { background-color: #1a2226; padding: 15px; text-align: center; font-weight: bold; }
        .nav-label { padding: 10px 20px; font-size: 12px; color: #4b646f; background: #1a2226; }
        .nav-item { display: flex; align-items: center; padding: 12px 20px; color: var(--text-gray); text-decoration: none; cursor: pointer; border-left: 3px solid transparent; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: #fff; border-left-color: #3c8dbc; }
        .nav-item i { margin-right: 10px; width: 20px; }
        .content { margin-left: var(--sidebar-width); flex-grow: 1; transition: 0.3s; width: 100%; }
        .content.expanded { margin-left: 0; }
        .top-nav { background: var(--topbar-bg); height: 50px; display: flex; align-items: center; padding: 0 20px; color: white; justify-content: space-between; }
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-top: 3px solid #d2d6de; box-shadow: 0 1px 1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .form-container { display: flex; flex-direction: column; gap: 15px; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 180px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 2px; box-sizing: border-box; height: 35px; }
        input:read-only { background-color: #eee; cursor: not-allowed; }
        .btn-add { background: #00a65a; color: white; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; border-radius: 2px; height: 40px; width: fit-content; margin-top: 10px; }
        .btn-add:hover { background: #008d4c; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th { text-align: left; background: #f4f4f4; padding: 12px; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .status-pill { padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .status-paid { background: #e6fffa; color: #00a65a; }
        .status-pending { background: #fff5f5; color: #dd4b39; }
        /* Grading styles */
        .grade-badge { padding: 3px 8px; border-radius: 4px; color: white; font-weight: bold; font-size: 12px; }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .sidebar.mobile-open { transform: translateX(0); } .content { margin-left: 0 !important; } }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">DIPLOMA ADMIN</div>
        <div class="nav-label">MAIN NAVIGATION</div>
        <a class="nav-item active" onclick="showTab('dashboard', this)"><i class="fa fa-dashboard"></i> Dashboard</a>
        <a class="nav-item" onclick="showTab('students', this)"><i class="fa fa-users"></i> Students</a>
        <a class="nav-item" onclick="showTab('courses', this)"><i class="fa fa-graduation-cap"></i> Courses</a>
        <a class="nav-item" onclick="showTab('units', this)"><i class="fa fa-book"></i> Units</a>
        <a class="nav-item" onclick="showTab('marks', this)"><i class="fa fa-edit"></i> Score Marks</a>
        <a class="nav-item" onclick="showTab('fees', this)"><i class="fa fa-money-bill"></i> Fees</a>
        <div class="nav-label">ACTIONS</div>
        <a class="nav-item" onclick="resetSystem()" style="color:#ff7675;"><i class="fa fa-trash"></i> logout</a>
    </div>

    <div class="content" id="content">
        <nav class="top-nav">
            <i class="fa fa-bars" style="cursor:pointer" id="menuBtn"></i>
            <span>System Manager</span>
            <div>Admin <i class="fa fa-circle" style="color:#4f4; font-size:10px"></i></div>
        </nav>

        <div class="container">
            <h2 id="pageTitle">DASHBOARD</h2>
            <div id="addFormContainer" class="card" style="display:none;">
                <div class="form-container" id="dynamicForm"></div>
            </div>
            <div class="card">
                <div id="tableArea"></div>
            </div>
        </div>
    </div>

<script>
let currentTab = 'dashboard';
const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');
const SEMESTER_FEE = 50000;

document.getElementById('menuBtn').onclick = (e) => {
    e.stopPropagation();
    if(window.innerWidth > 768) {
        sidebar.classList.toggle('collapsed');
        content.classList.toggle('expanded');
    } else {
        sidebar.classList.toggle('mobile-open');
    }
};

function getGrade(score) {
    if (score >= 70) return { label: 'A', color: '#00a65a' };
    if (score >= 60) return { label: 'B', color: '#3c8dbc' };
    if (score >= 50) return { label: 'C', color: '#f39c12' };
    if (score >= 40) return { label: 'D', color: '#00c0ef' };
    return { label: 'E', color: '#dd4b39' };
}

function showTab(tab, element) {
    currentTab = tab;
    document.getElementById('pageTitle').innerText = tab.toUpperCase();
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    if(element) element.classList.add('active');

    const formBox = document.getElementById('addFormContainer');
    if(tab === 'dashboard') {
        formBox.style.display = 'none';
        renderDashboard();
    } else {
        formBox.style.display = 'block';
        setupForm(tab);
        renderTable(tab);
    }
}

function setupForm(tab) {
    const container = document.getElementById('dynamicForm');
    container.innerHTML = '';

    if(tab === 'courses') {
        container.innerHTML = `
            <div class="form-row">
                <div class="form-group"><label>Course Name</label><input type="text" id="c_name"></div>
                <div class="form-group"><label>Course ID</label><input type="text" id="c_id"></div>
                <div class="form-group"><label>Duration</label><input type="text" id="c_duration"></div>
            </div>
            <button class="btn-add" onclick="handleSave()">Add Course</button>
        `;
    } 
    else if(tab === 'students') {
        container.innerHTML = `
            <div class="form-row">
                <div class="form-group"><label>Full Name</label><input type="text" id="s_name"></div>
                <div class="form-group"><label>Reg Number</label><input type="text" id="s_reg"></div>
                <div class="form-group"><label>Email</label><input type="email" id="s_email"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Assign Course</label><select id="courseSelect" onchange="autoFillCourseID('s_course_id')"></select></div>
                <div class="form-group"><label>Course ID</label><input type="text" id="s_course_id" readonly></div>
                <div class="form-group"><label>Year</label><select id="s_year"><option value="1">Year 1</option><option value="2">Year 2</option></select></div>
                <div class="form-group"><label>Semester</label><select id="s_sem"><option value="1">Sem 1</option><option value="2">Sem 2</option></select></div>
            </div>
            <button class="btn-add" onclick="handleSave()">Register Student</button>
        `;
        loadCoursesIntoDropdown('courseSelect');
    }
    else if(tab === 'units') {
        container.innerHTML = `
            <div class="form-row">
                <div class="form-group"><label>Unit Name</label><input type="text" id="u_name"></div>
                <div class="form-group"><label>Unit Code</label><input type="text" id="u_code"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Course</label><select id="u_courseSelect" onchange="autoFillCourseID('u_course_id')"></select></div>
                <div class="form-group"><label>Course ID</label><input type="text" id="u_course_id" readonly></div>
                <div class="form-group"><label>Year</label><select id="u_year"><option value="1">Year 1</option><option value="2">Year 2</option></select></div>
                <div class="form-group"><label>Semester</label><select id="u_sem"><option value="1">Sem 1</option><option value="2">Sem 2</option></select></div>
            </div>
            <button class="btn-add" onclick="handleSave()">Add & Assign Unit</button>
        `;
        loadCoursesIntoDropdown('u_courseSelect');
    }
    else if(tab === 'fees') {
        container.innerHTML = `
            <div class="form-row">
                <div class="form-group"><label>Select Student</label><select id="f_student_reg"></select></div>
                <div class="form-group"><label>Semester Fee</label><input type="text" value="${SEMESTER_FEE}" readonly></div>
                <div class="form-group"><label>Amount Paid</label><input type="number" id="f_paid_amount" placeholder="Enter Amount"></div>
            </div>
            <button class="btn-add" onclick="handleSave()">Record Payment</button>
        `;
        loadStudentsIntoDropdown('f_student_reg');
    }
    else if(tab === 'marks') {
        container.innerHTML = `
            <div class="form-row">
                <div class="form-group"><label>Student</label><select id="m_student_reg" onchange="loadUnitsForMarks()"></select></div>
                <div class="form-group"><label>Unit</label><select id="m_unit_code"></select></div>
                <div class="form-group"><label>Score (0-100)</label><input type="number" id="m_score" min="0" max="100"></div>
            </div>
            <button class="btn-add" onclick="handleSave()">Save Marks</button>
        `;
        loadStudentsIntoDropdown('m_student_reg');
    }
}

function loadUnitsForMarks() {
    const reg = document.getElementById('m_student_reg').value;
    const students = JSON.parse(localStorage.getItem('db_students')) || [];
    const student = students.find(s => s.reg === reg);
    const unitSelect = document.getElementById('m_unit_code');
    unitSelect.innerHTML = '<option value="">-- Select Unit --</option>';
    
    if (student) {
        const units = JSON.parse(localStorage.getItem('db_units')) || [];
        const filtered = units.filter(u => u.courseId === student.courseId && u.year === student.year && u.sem === student.sem);
        filtered.forEach(u => {
            unitSelect.innerHTML += `<option value="${u.code}">${u.name}</option>`;
        });
    }
}

function loadCoursesIntoDropdown(selectId) {
    const courses = JSON.parse(localStorage.getItem('db_courses')) || [];
    const select = document.getElementById(selectId);
    if(!select) return;
    select.innerHTML = '<option value="" data-id="">-- Select Course --</option>';
    courses.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.name; opt.setAttribute('data-id', c.id); opt.textContent = c.name;
        select.appendChild(opt);
    });
}

function loadStudentsIntoDropdown(selectId) {
    const students = JSON.parse(localStorage.getItem('db_students')) || [];
    const select = document.getElementById(selectId);
    if(!select) return;
    select.innerHTML = '<option value="">-- Select Student --</option>';
    students.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.reg; opt.textContent = `${s.name} (${s.reg})`;
        select.appendChild(opt);
    });
}

function autoFillCourseID(targetInputId) {
    const selectId = targetInputId === 's_course_id' ? 'courseSelect' : 'u_courseSelect';
    const select = document.getElementById(selectId);
    const idInput = document.getElementById(targetInputId);
    const selectedOption = select.options[select.selectedIndex];
    idInput.value = selectedOption.getAttribute('data-id') || '';
}

function handleSave() {
    if(currentTab === 'courses') {
        const name = document.getElementById('c_name').value;
        const id = document.getElementById('c_id').value;
        const duration = document.getElementById('c_duration').value;
        if(!name || !id) return alert("Fill course details!");
        saveData('db_courses', { name, id, duration });
    } 
    else if(currentTab === 'students') {
        const entry = {
            name: document.getElementById('s_name').value,
            reg: document.getElementById('s_reg').value,
            courseName: document.getElementById('courseSelect').value,
            courseId: document.getElementById('s_course_id').value,
            year: document.getElementById('s_year').value,
            sem: document.getElementById('s_sem').value
        };
        if(!entry.name || !entry.reg) return alert("Complete Student details!");
        saveData('db_students', entry);
    }
    else if(currentTab === 'units') {
        const unit = {
            name: document.getElementById('u_name').value,
            code: document.getElementById('u_code').value,
            assignedCourse: document.getElementById('u_courseSelect').value,
            courseId: document.getElementById('u_course_id').value, 
            year: document.getElementById('u_year').value, 
            sem: document.getElementById('u_sem').value
        };
        const allUnits = JSON.parse(localStorage.getItem('db_units')) || [];
        const count = allUnits.filter(u => u.courseId === unit.courseId && u.year === unit.year && u.sem === unit.sem).length;
        if(count >= 6) return alert("Limit Reached (6 units per semester)!");
        saveData('db_units', unit);
    }
    else if(currentTab === 'fees') {
        const reg = document.getElementById('f_student_reg').value;
        const paid = parseFloat(document.getElementById('f_paid_amount').value) || 0;
        if(!reg) return alert("Select a student!");
        let allFees = JSON.parse(localStorage.getItem('db_fees')) || {};
        allFees[reg] = (allFees[reg] || 0) + paid;
        localStorage.setItem('db_fees', JSON.stringify(allFees));
    }
    else if(currentTab === 'marks') {
        const reg = document.getElementById('m_student_reg').value;
        const code = document.getElementById('m_unit_code').value;
        const score = parseInt(document.getElementById('m_score').value);
        if(!reg || !code || isNaN(score)) return alert("Select student, unit and enter marks!");
        
        let allMarks = JSON.parse(localStorage.getItem('db_marks')) || [];
        // Remove old entry for same student/unit if exists
        allMarks = allMarks.filter(m => !(m.reg === reg && m.code === code));
        allMarks.push({ reg, code, score });
        localStorage.setItem('db_marks', JSON.stringify(allMarks));
    }
    setupForm(currentTab);
    renderTable(currentTab);
}

function saveData(key, obj) {
    const data = JSON.parse(localStorage.getItem(key)) || [];
    data.push(obj);
    localStorage.setItem(key, JSON.stringify(data));
}

function renderTable(tab) {
    const area = document.getElementById('tableArea');
    
    if(tab === 'fees') {
        const students = JSON.parse(localStorage.getItem('db_students')) || [];
        const feeData = JSON.parse(localStorage.getItem('db_fees')) || {};
        if(students.length === 0) { area.innerHTML = "<p>No registered students.</p>"; return; }
        let html = `<table><tr><th>Student Name</th><th>Reg No</th><th>Total Fee</th><th>Paid</th><th>Balance</th><th>Status</th></tr>`;
        students.forEach(s => {
            const paid = feeData[s.reg] || 0;
            const balance = SEMESTER_FEE - paid;
            const statusClass = balance <= 0 ? 'status-paid' : 'status-pending';
            const statusText = balance <= 0 ? 'Cleared' : 'Pending';
            html += `<tr><td>${s.name}</td><td>${s.reg}</td><td>${SEMESTER_FEE.toLocaleString()}</td><td>${paid.toLocaleString()}</td><td>${balance.toLocaleString()}</td><td><span class="status-pill ${statusClass}">${statusText}</span></td></tr>`;
        });
        area.innerHTML = html + `</table>`;
    } 
    else if(tab === 'marks') {
        const marksData = JSON.parse(localStorage.getItem('db_marks')) || [];
        const students = JSON.parse(localStorage.getItem('db_students')) || [];
        const units = JSON.parse(localStorage.getItem('db_units')) || [];
        if(marksData.length === 0) { area.innerHTML = "<p>No marks recorded yet.</p>"; return; }
        let html = `<table><tr><th>Student</th><th>Unit</th><th>Score</th><th>Grade</th></tr>`;
        marksData.forEach(m => {
            const student = students.find(s => s.reg === m.reg);
            const unit = units.find(u => u.code === m.code);
            const grade = getGrade(m.score);
            html += `<tr><td>${student ? student.name : m.reg}</td><td>${unit ? unit.name : m.code}</td><td>${m.score}</td><td><span class="grade-badge" style="background:${grade.color}">${grade.label}</span></td></tr>`;
        });
        area.innerHTML = html + `</table>`;
    }
    else {
        const data = JSON.parse(localStorage.getItem('db_' + tab)) || [];
        if(data.length === 0) { area.innerHTML = "<p>No records found.</p>"; return; }
        let html = `<table>`;
        if(tab === 'courses') {
            html += `<tr><th>Course Name</th><th>ID</th><th>Duration</th></tr>`;
            data.forEach(i => html += `<tr><td>${i.name}</td><td>${i.id}</td><td>${i.duration}</td></tr>`);
        } else if(tab === 'students') {
            html += `<tr><th>Name</th><th>Reg No</th><th>Course</th><th>Yr/Sem</th></tr>`;
            data.forEach(i => html += `<tr><td>${i.name}</td><td>${i.reg}</td><td>${i.courseName}</td><td>Y${i.year} S${i.sem}</td></tr>`);
        } else if(tab === 'units') {
            data.sort((a, b) => (a.year + a.sem).localeCompare(b.year + b.sem));
            html += `<tr><th>Unit Name</th><th>Code</th><th>Course</th><th>Yr/Sem</th></tr>`;
            data.forEach(i => html += `<tr><td>${i.name}</td><td>${i.code}</td><td>${i.assignedCourse}</td><td>Y${i.year} S${i.sem}</td></tr>`);
        }
        area.innerHTML = html + `</table>`;
    }
}

function renderDashboard() {
    const s = (JSON.parse(localStorage.getItem('db_students')) || []).length;
    const c = (JSON.parse(localStorage.getItem('db_courses')) || []).length;
    const u = (JSON.parse(localStorage.getItem('db_units')) || []).length;
    document.getElementById('tableArea').innerHTML = `
        <div style="display:flex; gap:20px; flex-wrap:wrap;">
            <div style="background:#00c0ef; color:white; padding:20px; flex:1; min-width:150px; border-radius:3px;"><h3>${s}</h3><p>Students</p></div>
            <div style="background:#00a65a; color:white; padding:20px; flex:1; min-width:150px; border-radius:3px;"><h3>${c}</h3><p>Courses</p></div>
            <div style="background:#f39c12; color:white; padding:20px; flex:1; min-width:150px; border-radius:3px;"><h3>${u}</h3><p>Units</p></div>
        </div>
    `;
}

function resetSystem() { if(confirm("log out?")) { localStorage.clear(); location.reload(); } }

renderDashboard();
</script>
</body>
</html>
