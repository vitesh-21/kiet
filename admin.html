<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Diploma System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #222d32;
            --sidebar-hover: #1e282c;
            --topbar-bg: #00a65a;
            --main-bg: #ecf0f5;
            --text-gray: #b8c7ce;
            --sidebar-width: 230px;
        }

        body {
            margin: 0;
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--main-bg);
            display: flex;
            min-height: 100vh;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        /* This is the magic class that hides the sidebar */
        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .brand {
            background-color: #1a2226;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .user-panel {
            padding: 15px;
            display: flex;
            align-items: center;
            background: #1a2226;
        }

        .user-panel i { font-size: 30px; margin-right: 10px; color: #dbdbdb; }

        .nav-label {
            padding: 10px 20px;
            font-size: 12px;
            color: #4b646f;
            background: #1a2226;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: var(--text-gray);
            text-decoration: none;
            border-left: 3px solid transparent;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--sidebar-hover);
            color: #fff;
            border-left-color: #3c8dbc;
        }

        .nav-item i { margin-right: 10px; width: 20px; }

        /* --- CONTENT AREA --- */
        .content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            width: 100%;
            transition: margin-left 0.3s ease;
        }

        /* When sidebar is collapsed, content takes full width */
        .content.expanded {
            margin-left: 0;
        }

        .top-nav {
            background-color: var(--topbar-bg);
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
        }

        .menu-toggle { cursor: pointer; font-size: 20px; }

        .container { padding: 20px; }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 3px;
        }

        .bg-cyan { background: #00c0ef; }
        .bg-green { background: #00a65a; }
        .bg-blue { background: #3c8dbc; }

        .info-box {
            background: white;
            padding: 20px;
            border-top: 3px solid #d2d6de;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
        }

        .btn {
            background: #00a65a;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Mobile View */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .content { margin-left: 0 !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">DIPLOMA ADMIN</div>
        <div class="user-panel">
            <i class="fa fa-user-circle"></i>
            <div>
                <p style="margin:0; font-size:14px;">System Admin</p>
                <small style="color:#44dd44;">● Online</small>
            </div>
        </div>

        <div class="nav-label">MAIN NAVIGATION</div>
        <a class="nav-item active" onclick="navigate('dashboard')"><i class="fa fa-dashboard"></i> Dashboard</a>
        <a class="nav-item" onclick="navigate('students')"><i class="fa fa-users"></i> Students List</a>
        
        <div class="nav-label">ACTIONS</div>
        <a class="nav-item" onclick="navigate('register')"><i class="fa fa-plus"></i> Register Student</a>
        <a class="nav-item" onclick="clearAllData()" style="color:#ff7675;"><i class="fa fa-trash"></i> Reset System</a>
    </div>

    <div class="content" id="content">
        <nav class="top-nav">
            <div style="display: flex; align-items: center;">
                <i class="fa fa-bars menu-toggle" id="menuBtn"></i>
                <span style="margin-left:15px;">Student Management System</span>
            </div>
            <div>Admin <i class="fa fa-user-shield"></i></div>
        </nav>

        <div class="container">
            
            <div id="page-dashboard" class="page">
                <h2>Dashboard Overview</h2>
                <div class="stats-grid">
                    <div class="stat-card bg-cyan">
                        <div><h3 id="count-display">0</h3><p>STUDENTS</p></div>
                        <i class="fa fa-users fa-3x" style="opacity:0.3"></i>
                    </div>
                    <div class="stat-card bg-green">
                        <div><h3>15</h3><p>COURSES</p></div>
                        <i class="fa fa-book fa-3x" style="opacity:0.3"></i>
                    </div>
                    <div class="stat-card bg-blue">
                        <div><h3 id="fee-display">KES 0</h3><p>TOTAL FEES</p></div>
                        <i class="fa fa-money-bill fa-3x" style="opacity:0.3"></i>
                    </div>
                </div>
            </div>

            <div id="page-register" class="page" style="display:none;">
                <h2>Register New Student</h2>
                <div class="info-box">
                    <label>Student Name</label>
                    <input type="text" id="stuName" placeholder="Enter Full Name">
                    <label>Fee Balance (KES)</label>
                    <input type="number" id="stuFee" placeholder="Enter Amount">
                    <button class="btn" onclick="saveStudent()">Register Student</button>
                </div>
            </div>

            <div id="page-students" class="page" style="display:none;">
                <h2>Student Records</h2>
                <div class="info-box" id="table-container">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');
        const menuBtn = document.getElementById('menuBtn');

        // --- SIDEBAR TOGGLE ---
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('collapsed');
                content.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('mobile-open');
            }
        });

        // Close sidebar on mobile when clicking outside
        document.addEventListener('click', () => {
            sidebar.classList.remove('mobile-open');
        });

        // --- NAVIGATION ---
        function navigate(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            // Show selected page
            document.getElementById('page-' + pageId).style.display = 'block';
            
            // Update active menu class
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(pageId === 'dashboard') updateDashboard();
            if(pageId === 'students') renderTable();
        }

        // --- DATA LOGIC ---
        function saveStudent() {
            const name = document.getElementById('stuName').value;
            const fee = document.getElementById('stuFee').value;

            if(!name || !fee) return alert("Please fill in all fields");

            const students = JSON.parse(localStorage.getItem('my_students')) || [];
            students.push({ name, fee: parseFloat(fee) });
            localStorage.setItem('my_students', JSON.stringify(students));

            alert("Student added!");
            document.getElementById('stuName').value = "";
            document.getElementById('stuFee').value = "";
            navigate('dashboard');
        }

        function updateDashboard() {
            const students = JSON.parse(localStorage.getItem('my_students')) || [];
            const totalFees = students.reduce((sum, s) => sum + s.fee, 0);

            document.getElementById('count-display').innerText = students.length;
            document.getElementById('fee-display').innerText = "KES " + totalFees.toLocaleString();
        }

        function renderTable() {
            const students = JSON.parse(localStorage.getItem('my_students')) || [];
            const container = document.getElementById('table-container');

            if(students.length === 0) {
                container.innerHTML = "No students registered.";
                return;
            }

            let html = `<table style="width:100%; border-collapse: collapse;">
                <tr style="background:#eee; text-align:left;">
                    <th style="padding:10px;">Name</th><th style="padding:10px;">Fee</th>
                </tr>`;
            students.forEach(s => {
                html += `<tr style="border-bottom:1px solid #ddd;">
                    <td style="padding:10px;">${s.name}</td>
                    <td style="padding:10px;">KES ${s.fee.toLocaleString()}</td>
                </tr>`;
            });
            html += `</table>`;
            container.innerHTML = html;
        }

        function clearAllData() {
            if(confirm("Wipe all data? This cannot be undone.")) {
                localStorage.removeItem('my_students');
                location.reload();
            }
        }

        // Load initial dashboard data
        updateDashboard();
    </script>
</body>
</html>
