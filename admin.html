<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Diploma System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-bg: #222d32;
            --sidebar-hover: #1e282c;
            --topbar-bg: #00a65a;
            --main-bg: #ecf0f5;
            --text-gray: #b8c7ce;
            --sidebar-width: 230px;
        }

        body { margin: 0; font-family: 'Source Sans Pro', sans-serif; background-color: var(--main-bg); display: flex; min-height: 100vh; }

        /* --- SIDEBAR --- */
        .sidebar { width: var(--sidebar-width); background-color: var(--sidebar-bg); color: white; position: fixed; top: 0; left: 0; bottom: 0; transition: transform 0.3s ease; z-index: 1000; }
        .sidebar.collapsed { transform: translateX(-100%); }
        .brand { background-color: #1a2226; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
        .nav-label { padding: 10px 20px; font-size: 12px; color: #4b646f; background: #1a2226; }
        .nav-item { display: flex; align-items: center; padding: 12px 20px; color: var(--text-gray); text-decoration: none; border-left: 3px solid transparent; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: #fff; border-left-color: #3c8dbc; }
        .nav-item i { margin-right: 10px; width: 20px; }

        /* --- CONTENT AREA --- */
        .content { margin-left: var(--sidebar-width); flex-grow: 1; width: 100%; transition: margin-left 0.3s ease; }
        .content.expanded { margin-left: 0; }
        .top-nav { background-color: var(--topbar-bg); height: 50px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; color: white; }
        .menu-toggle { cursor: pointer; font-size: 20px; }
        .container { padding: 20px; }

        /* Page Headers & Add Button */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-add { background: #3c8dbc; color: white; border: none; padding: 8px 15px; border-radius: 3px; cursor: pointer; font-weight: 600; }
        .btn-add:hover { background: #367fa9; }

        .info-box { background: white; padding: 20px; border-top: 3px solid #d2d6de; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f4f4f4; text-align: left; padding: 10px; border-bottom: 2px solid #ddd; }
        td { padding: 10px; border-bottom: 1px solid #ddd; }

        /* --- MODAL (POPUP) --- */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 400px; border-radius: 5px; position: relative; }
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .close-modal { position: absolute; right: 20px; top: 15px; cursor: pointer; font-size: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-save { background: #00a65a; color: white; border: none; width: 100%; padding: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.mobile-open { transform: translateX(0); }
            .content { margin-left: 0 !important; }
            .modal-content { width: 90%; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="brand">DIPLOMA ADMIN</div>
        <div class="nav-label">MAIN NAVIGATION</div>
        <a class="nav-item active" onclick="navigate('dashboard')"><i class="fa fa-dashboard"></i> Dashboard</a>
        <a class="nav-item" onclick="navigate('students')"><i class="fa fa-users"></i> Students</a>
        <a class="nav-item" onclick="navigate('courses')"><i class="fa fa-graduation-cap"></i> Courses</a>
        <a class="nav-item" onclick="navigate('units')"><i class="fa fa-book"></i> Units</a>
        <a class="nav-item" onclick="navigate('fees')"><i class="fa fa-money-bill"></i> Fees</a>
        
        <div class="nav-label">SYSTEM</div>
        <a class="nav-item" onclick="clearAllData()" style="color:#ff7675;"><i class="fa fa-trash"></i> Reset Data</a>
    </div>

    <div class="content" id="content">
        <nav class="top-nav">
            <div style="display: flex; align-items: center;">
                <i class="fa fa-bars menu-toggle" id="menuBtn"></i>
                <span style="margin-left:15px;">Diploma Management System</span>
            </div>
        </nav>

        <div class="container" id="main-view">
            </div>
    </div>

    <div id="entryModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-header" id="modalTitle">Add New Entry</div>
            <div id="modalBody">
                </div>
            <button class="btn-save" onclick="saveData()">Save Record</button>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('content');
        const menuBtn = document.getElementById('menuBtn');
        let currentTab = 'dashboard';

        // --- SIDEBAR LOGIC ---
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('collapsed');
                content.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('mobile-open');
            }
        });

        // --- NAVIGATION & RENDERING ---
        function navigate(tab) {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            renderView();
            if (window.innerWidth <= 768) sidebar.classList.remove('mobile-open');
        }

        function renderView() {
            const container = document.getElementById('main-view');
            let html = `<div class="page-header">
                            <h2>${currentTab.toUpperCase()}</h2>
                            ${currentTab !== 'dashboard' ? `<button class="btn-add" onclick="openModal()">+ Add ${currentTab.slice(0,-1)}</button>` : ''}
                        </div>`;

            const data = JSON.parse(localStorage.getItem('sys_' + currentTab)) || [];

            html += `<div class="info-box">`;
            if (currentTab === 'dashboard') {
                html += `<p>Select a tab from the sidebar to manage records.</p>`;
            } else if (data.length === 0) {
                html += `<p>No records found in ${currentTab}. Click the button above to add one.</p>`;
            } else {
                html += `<table><tr><th>Name/Title</th><th>Detail</th></tr>`;
                data.forEach(item => {
                    html += `<tr><td>${item.name}</td><td>${item.detail}</td></tr>`;
                });
                html += `</table>`;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        // --- MODAL LOGIC ---
        function openModal() {
            const modal = document.getElementById('entryModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.innerText = "Add New " + currentTab.slice(0,-1);
            
            // Customize inputs based on tab
            let label2 = currentTab === 'students' || currentTab === 'fees' ? "Amount (KES)" : "Description/Code";
            body.innerHTML = `
                <label>Name</label>
                <input type="text" id="inputName" placeholder="Enter Name...">
                <label>${label2}</label>
                <input type="text" id="inputDetail" placeholder="Enter Details...">
            `;
            
            modal.style.display = "block";
        }

        function closeModal() {
            document.getElementById('entryModal').style.display = "none";
        }

        function saveData() {
            const name = document.getElementById('inputName').value;
            const detail = document.getElementById('inputDetail').value;

            if(!name || !detail) return alert("Please fill fields");

            const data = JSON.parse(localStorage.getItem('sys_' + currentTab)) || [];
            data.push({ name, detail });
            localStorage.setItem('sys_' + currentTab, JSON.stringify(data));

            closeModal();
            renderView();
        }

        function clearAllData() {
            if(confirm("Wipe all system data?")) {
                localStorage.clear();
                location.reload();
            }
        }

        // Initial Load
        renderView();
    </script>
</body>
</html>
