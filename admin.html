<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Diploma System</title>

<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* (YOUR ORIGINAL CSS — UNTOUCHED) */
:root {
    --sidebar-bg: #222d32;
    --sidebar-hover: #1e282c;
    --topbar-bg: #00a65a;
    --main-bg: #ecf0f5;
    --text-gray: #b8c7ce;
    --sidebar-width: 230px;
}

body { margin: 0; font-family: 'Source Sans Pro', sans-serif; background-color: var(--main-bg); display: flex; min-height: 100vh; }

.sidebar { width: var(--sidebar-width); background-color: var(--sidebar-bg); color: white; position: fixed; top: 0; left: 0; bottom: 0; transition: 0.3s; }
.brand { background-color: #1a2226; padding: 15px; text-align: center; font-weight: bold; }
.nav-item { display: flex; align-items: center; padding: 12px 20px; color: var(--text-gray); cursor: pointer; }
.nav-item:hover, .nav-item.active { background: var(--sidebar-hover); color: #fff; }

.content { margin-left: var(--sidebar-width); flex-grow: 1; }
.top-nav { background: var(--topbar-bg); height: 50px; display: flex; align-items: center; padding: 0 20px; color: white; justify-content: space-between; }

.container { padding: 20px; }
.card { background: white; padding: 20px; margin-bottom: 20px; }

input, select { width: 100%; padding: 8px; margin: 5px 0; }

.btn-add { background: #00a65a; color: white; padding: 10px; border: none; cursor: pointer; }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px; border-bottom: 1px solid #ddd; }
</style>
</head>

<body>

<div class="sidebar">
    <div class="brand">DIPLOMA ADMIN</div>
    <a class="nav-item active" onclick="showTab('dashboard')">Dashboard</a>
    <a class="nav-item" onclick="showTab('students')">Students</a>
    <a class="nav-item" onclick="showTab('courses')">Courses</a>
    <a class="nav-item" onclick="showTab('units')">Units</a>
    <a class="nav-item" onclick="showTab('fees')">Fees</a>
</div>

<div class="content">
    <div class="top-nav">Admin Panel</div>

    <div class="container">
        <h2 id="pageTitle">Dashboard</h2>

        <div id="addFormContainer" class="card" style="display:none;"></div>

        <div class="card">
            <div id="tableArea"></div>
        </div>
    </div>
</div>

<script>
let currentTab = 'dashboard';

function showTab(tab){
    currentTab = tab;
    document.getElementById('pageTitle').innerText = tab.toUpperCase();

    if(tab === 'dashboard'){
        document.getElementById('addFormContainer').style.display = 'none';
        renderDashboard();
    } else {
        document.getElementById('addFormContainer').style.display = 'block';
        setupForm(tab);
        renderTable(tab);
    }
}

/* ================= STUDENT FORM ================= */
function setupForm(tab){
    const formBox = document.getElementById('addFormContainer');

    if(tab === 'students'){
        formBox.innerHTML = `
            <h3>Add Student</h3>
            <input id="full_name" placeholder="Full Name">
            <input id="reg_number" placeholder="Registration Number">
            <input id="email" placeholder="Email">
            <input id="password" type="password" placeholder="Password">

            <select id="course">
                <option value="">Course</option>
                <option>IT</option>
                <option>CS</option>
            </select>

            <select id="year">
                <option value="">Year</option>
                <option>1</option>
                <option>2</option>
            </select>

            <select id="semester">
                <option value="">Semester</option>
                <option>1</option>
                <option>2</option>
            </select>

            <button class="btn-add" onclick="saveStudent()">Add Student</button>
        `;
    } else {
        formBox.innerHTML = `
            <input id="input1" placeholder="Name">
            <input id="input2" placeholder="Details">
            <button class="btn-add" onclick="handleSave()">Add Entry</button>
        `;
    }
}

/* ================= SAVE STUDENT ================= */
function saveStudent(){
    let students = JSON.parse(localStorage.getItem('students') || '[]');

    const student = {
        full_name: document.getElementById('full_name').value,
        reg_number: document.getElementById('reg_number').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        course: document.getElementById('course').value,
        year: document.getElementById('year').value,
        semester: document.getElementById('semester').value
    };

    students.push(student);
    localStorage.setItem('students', JSON.stringify(students));

    renderTable('students');
}

/* ================= TABLE ================= */
function renderTable(tab){
    const area = document.getElementById('tableArea');

    if(tab === 'students'){
        const students = JSON.parse(localStorage.getItem('students') || '[]');

        let html = `<table>
            <tr>
                <th>Name</th>
                <th>Reg</th>
                <th>Email</th>
                <th>Course</th>
                <th>Year</th>
                <th>Sem</th>
            </tr>`;

        students.forEach(s=>{
            html += `<tr>
                <td>${s.full_name}</td>
                <td>${s.reg_number}</td>
                <td>${s.email}</td>
                <td>${s.course}</td>
                <td>${s.year}</td>
                <td>${s.semester}</td>
            </tr>`;
        });

        html += `</table>`;
        area.innerHTML = html;
        return;
    }

    const data = JSON.parse(localStorage.getItem('db_'+tab)) || [];

    let html = `<table><tr><th>Name</th><th>Details</th></tr>`;
    data.forEach(d=>{
        html += `<tr><td>${d.col1}</td><td>${d.col2}</td></tr>`;
    });
    html += `</table>`;

    area.innerHTML = html;
}

/* ================= DEFAULT SAVE ================= */
function handleSave(){
    const val1 = document.getElementById('input1').value;
    const val2 = document.getElementById('input2').value;

    let data = JSON.parse(localStorage.getItem('db_'+currentTab)) || [];
    data.push({col1: val1, col2: val2});
    localStorage.setItem('db_'+currentTab, JSON.stringify(data));

    renderTable(currentTab);
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
    document.getElementById('tableArea').innerHTML = `
        <h3>Students: ${(JSON.parse(localStorage.getItem('students'))||[]).length}</h3>
        <h3>Courses: ${(JSON.parse(localStorage.getItem('db_courses'))||[]).length}</h3>
    `;
}

renderDashboard();
</script>

</body>
</html>
