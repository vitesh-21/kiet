<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
body {
background: #1a1a2e;
font-family: 'Segoe UI', sans-serif;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: white;
padding: 30px;
border-radius: 10px;
width: 350px;
box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

h2 { text-align: center; }

input {
width: 100%;
padding: 12px;
margin-bottom: 15px;
border-radius: 5px;
border: 1px solid #ccc;
}

button {
width: 100%;
background: #28a745;
color: white;
padding: 12px;
border: none;
border-radius: 5px;
cursor: pointer;
}

.msg {
padding: 10px;
margin-bottom: 15px;
border-radius: 5px;
text-align: center;
}

.error { background: #f8d7da; color: #721c24; }
.success { background: #d4edda; color: #155724; }

a { display:block; text-align:center; margin-top:10px; }
</style>
</head>

<body>

<div class="container">
<h2>Reset Password</h2>

<div id="msgBox"></div>

<input type="text" id="username" placeholder="Enter username">
<input type="password" id="newPass" placeholder="New password">
<input type="password" id="confirmPass" placeholder="Confirm password">

<button onclick="resetPassword()">Update Password</button>

<a href="index.html">Back to Login</a>
</div>

<script>

// ===== FAKE DATABASE =====
let admins = JSON.parse(localStorage.getItem("admins")) || [
{ username: "admin", password: "1234" }
];

let students = JSON.parse(localStorage.getItem("students")) || [
{ name: "John Doe", password: "1234" }
];

// ===== SAVE =====
function saveData() {
localStorage.setItem("admins", JSON.stringify(admins));
localStorage.setItem("students", JSON.stringify(students));
}

// ===== MESSAGE =====
function showMsg(text, type) {
let box = document.getElementById("msgBox");
box.innerHTML = `<div class="msg ${type}">${text}</div>`;
}

// ===== RESET PASSWORD =====
function resetPassword() {
let username = document.getElementById("username").value;
let newPass = document.getElementById("newPass").value;
let confirm = document.getElementById("confirmPass").value;

// CHECK MATCH
if (newPass !== confirm) {
showMsg("Passwords do not match!", "error");
return;
}

// CHECK ADMIN
let admin = admins.find(a => a.username === username);
if (admin) {
admin.password = newPass;
saveData();
showMsg("Admin password updated! Redirecting...", "success");

setTimeout(() => {
window.location.href = "index.html";
}, 2000);

return;
}

// CHECK STUDENT
let student = students.find(s => s.name === username);
if (student) {
student.password = newPass;
saveData();
showMsg("Student password updated! Redirecting...", "success");

setTimeout(() => {
window.location.href = "index.html";
}, 2000);

return;
}

// NOT FOUND
showMsg("Username not found!", "error");

}

</script>

</body>
</html>
