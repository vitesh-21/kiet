<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Zetech University</title>
    <style>
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h2 { text-align: center; color: #1a1a2e; margin-bottom: 25px; }
        h2 span { color: #f36f21; }

        label { display: block; margin-bottom: 5px; font-size: 13px; color: #666; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box; /* Prevents input from overflowing */
            transition: 0.3s;
        }

        input:focus { border-color: #f36f21; outline: none; box-shadow: 0 0 5px rgba(243, 111, 33, 0.2); }

        button {
            width: 100%;
            background: #28a745;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #218838; transform: translateY(-1px); }

        .msg {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .links { display: flex; justify-content: center; margin-top: 20px; }
        a { color: #1a1a2e; text-decoration: none; font-size: 14px; }
        a:hover { text-decoration: underline; color: #f36f21; }

        /* Small Debug Button */
        #debugBtn { background: #eee; color: #666; border: none; font-size: 10px; margin-top: 20px; padding: 5px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ZETECH <span>RESET</span></h2>

    <div id="msgBox"></div>

    <label>Username (Email or Reg No.)</label>
    <input type="text" id="username" placeholder="e.g. john@student.com">

    <label>New Password</label>
    <input type="password" id="newPass" placeholder="••••••••">

    <label>Confirm New Password</label>
    <input type="password" id="confirmPass" placeholder="••••••••">

    <button onclick="resetPassword()">Update Password</button>

    <div class="links">
        <a href="index.html">← Back to Login</a>
    </div>

    <center><button id="debugBtn" onclick="checkData()">Check Database (Debug)</button></center>
</div>

<script>
    // 1. DATA SOURCE: This MUST match your registration page key
    let students = JSON.parse(localStorage.getItem("db_students")) || [];
    let admins = JSON.parse(localStorage.getItem("admins")) || [
        { username: "admin", password: "1234" }
    ];

    function showMsg(text, type) {
        let box = document.getElementById("msgBox");
        box.innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    function resetPassword() {
        let inputUser = document.getElementById("username").value.trim().toLowerCase();
        let newPass = document.getElementById("newPass").value;
        let confirm = document.getElementById("confirmPass").value;

        // Validations
        if (!inputUser || !newPass || !confirm) {
            showMsg("All fields are required!", "error");
            return;
        }

        if (newPass !== confirm) {
            showMsg("Passwords do not match!", "error");
            return;
        }

        // --- CHECK ADMINS ---
        let admin = admins.find(a => a.username.toLowerCase() === inputUser);
        if (admin) {
            admin.password = newPass;
            localStorage.setItem("admins", JSON.stringify(admins));
            successFlow();
            return;
        }

        // --- CHECK STUDENTS ---
        // Search by Email OR Registration Number
        let student = students.find(s => 
            (s.email && s.email.toLowerCase() === inputUser) || 
            (s.reg && s.reg.toLowerCase() === inputUser)
        );

        if (student) {
            student.password = newPass;
            // CRITICAL: Save back to 'db_students' key
            localStorage.setItem("db_students", JSON.stringify(students));
            successFlow();
            return;
        }

        // If nothing matches
        showMsg("User not found! Check your Email/Reg No.", "error");
    }

    function successFlow() {
        showMsg("Password updated successfully!", "success");
        setTimeout(() => {
            window.location.href = "index.html"; 
        }, 2000);
    }

    // DEBUG FUNCTION: This will tell you what names actually exist
    function checkData() {
        if (students.length === 0) {
            alert("The student database is EMPTY. Register a student first!");
        } else {
            let list = students.map(s => `Email: ${s.email} | Reg: ${s.reg}`).join("\n");
            alert("Valid Usernames in Database:\n\n" + list);
        }
    }
</script>

</body>
</html>
