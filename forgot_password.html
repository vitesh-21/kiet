<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
body {
background: #1a1a2e;
font-family: 'Segoe UI', sans-serif;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.container {
background: white;
padding: 30px;
border-radius: 10px;
width: 350px;
box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

h2 { text-align: center; }

input {
width: 100%;
padding: 12px;
margin-bottom: 15px;
border-radius: 5px;
border: 1px solid #ccc;
}

button {
width: 100%;
background: #28a745;
color: white;
padding: 12px;
border: none;
border-radius: 5px;
cursor: pointer;
}

.msg {
padding: 10px;
margin-bottom: 15px;
border-radius: 5px;
text-align: center;
}

.error { background: #f8d7da; color: #721c24; }
.success { background: #d4edda; color: #155724; }

a { display:block; text-align:center; margin-top:10px; }
</style>
</head>

<body>

<div class="container">
<h2>Reset Password</h2>

<div id="msgBox"></div>

<input type="text" id="username" placeholder="Enter username">
<input type="password" id="newPass" placeholder="New password">
<input type="password" id="confirmPass" placeholder="Confirm password">

<button onclick="resetPassword()">Update Password</button>

<a href="index.html">Back to Login</a>
</div>

<script>
// 1. Load the REAL databases you've been using in the portal
// NOTE: We check for 'db_students' because that is what your portal uses
let students = JSON.parse(localStorage.getItem("db_students")) || [];
let admins = JSON.parse(localStorage.getItem("admins")) || [
    { username: "admin", password: "1234" }
];

function showMsg(text, type) {
    let box = document.getElementById("msgBox");
    box.innerHTML = `<div class="msg ${type}">${text}</div>`;
}

function resetPassword() {
    let inputUser = document.getElementById("username").value.trim();
    let newPass = document.getElementById("newPass").value;
    let confirm = document.getElementById("confirmPass").value;

    if (!inputUser || !newPass) {
        showMsg("Please fill in all fields", "error");
        return;
    }

    if (newPass !== confirm) {
        showMsg("Passwords do not match!", "error");
        return;
    }

    // 2. CHECK ADMINS (Looking by username)
    let adminIndex = admins.findIndex(a => a.username.toLowerCase() === inputUser.toLowerCase());
    if (adminIndex !== -1) {
        admins[adminIndex].password = newPass;
        localStorage.setItem("admins", JSON.stringify(admins));
        showSuccess();
        return;
    }

    // 3. CHECK STUDENTS (Looking by EMAIL or REG NO)
    // We check both because students often forget which one is the "username"
    let studentIndex = students.findIndex(s => 
        (s.email && s.email.toLowerCase() === inputUser.toLowerCase()) || 
        (s.reg && s.reg.toLowerCase() === inputUser.toLowerCase())
    );

    if (studentIndex !== -1) {
        students[studentIndex].password = newPass;
        // IMPORTANT: Save back to 'db_students' to match your portal name
        localStorage.setItem("db_students", JSON.stringify(students));
        showSuccess();
        return;
    }

    // If we reach here, nothing was found
    showMsg("Username (Email/Reg No) not found!", "error");
}

function showSuccess() {
    showMsg("Password updated! Redirecting to login...", "success");
    setTimeout(() => {
        window.location.href = "index.html";
    }, 2000);
}

</script>

</body>
</html>
