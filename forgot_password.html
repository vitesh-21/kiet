<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Zetech University</title>
    <style>
        body {
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 380px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        h2 { text-align: center; color: #1a1a2e; margin-bottom: 25px; }
        h2 span { color: #f36f21; }

        label { display: block; margin-bottom: 5px; font-size: 13px; color: #666; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box; /* Prevents input from overflowing */
            transition: 0.3s;
        }

        input:focus { border-color: #f36f21; outline: none; box-shadow: 0 0 5px rgba(243, 111, 33, 0.2); }

        button {
            width: 100%;
            background: #28a745;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background: #218838; transform: translateY(-1px); }

        .msg {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .links { display: flex; justify-content: center; margin-top: 20px; }
        a { color: #1a1a2e; text-decoration: none; font-size: 14px; }
        a:hover { text-decoration: underline; color: #f36f21; }

        /* Small Debug Button */
        #debugBtn { background: #eee; color: #666; border: none; font-size: 10px; margin-top: 20px; padding: 5px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ZETECH <span>RESET</span></h2>

    <div id="msgBox"></div>

    <label>Username (Email or Reg No.)</label>
    <input type="text" id="username" placeholder="e.g. john@student.com">

    <label>New Password</label>
    <input type="password" id="newPass" placeholder="••••••••">

    <label>Confirm New Password</label>
    <input type="password" id="confirmPass" placeholder="••••••••">

    <button onclick="resetPassword()">Update Password</button>

    <div class="links">
        <a href="index.html">← Back to Login</a>
    </div>

    <center><button id="debugBtn" onclick="checkData()">Check Database (Debug)</button></center>
</div>
    <script>
        function resetPassword() {
    // 1. Grab the inputs
    let inputUser = document.getElementById("username").value.trim().toLowerCase();
    let newPass = document.getElementById("newPass").value;
    let confirm = document.getElementById("confirmPass").value;

    // 2. Look at EVERY possible key in your LocalStorage
    let db1 = JSON.parse(localStorage.getItem("db_students")) || [];
    let db2 = JSON.parse(localStorage.getItem("students")) || [];
    let db3 = JSON.parse(localStorage.getItem("users")) || [];

    // Combine them all into one search list
    let allPossibleStudents = [...db1, ...db2, ...db3];

    console.log("Searching through:", allPossibleStudents);

    // 3. Validation
    if (!inputUser || !newPass) {
        alert("Fill in all fields!");
        return;
    }

    // 4. THE SEARCH
    let foundStudent = allPossibleStudents.find(s => 
        (s.email && s.email.toLowerCase() === inputUser) || 
        (s.reg && s.reg.toLowerCase() === inputUser) ||
        (s.name && s.name.toLowerCase() === inputUser)
    );

    if (foundStudent) {
        // Update the password in the object
        foundStudent.password = newPass;

        // SAVE TO ALL POSSIBLE KEYS (To be safe)
        if(db1.length > 0) localStorage.setItem("db_students", JSON.stringify(db1));
        if(db2.length > 0) localStorage.setItem("students", JSON.stringify(db2));
        if(db3.length > 0) localStorage.setItem("users", JSON.stringify(db3));
        
        alert("SUCCESS! Password updated for " + (foundStudent.name || foundStudent.email));
        window.location.href = "index.html";
    } else {
        // DIAGNOSTIC ALERT
        let existingNames = allPossibleStudents.map(s => s.email || s.name || s.reg).join(", ");
        alert("USER NOT FOUND.\n\nType exactly one of these existing users:\n" + (existingNames || "NONE FOUND - The database is empty!"));
    }
}
</script>

</body>
</html>
