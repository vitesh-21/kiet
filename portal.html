<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zetech Student Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --nav-dark: #0b1528; --accent-orange: #f36f21; --bg-body: #f0f2f5; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-body); }
        
        /* Navigation */
        .top-nav { background: var(--nav-dark); height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 50px; color: white; position: sticky; top: 0; z-index: 1000; }
        .nav-links { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-links li a { color: #bdc3c7; text-decoration: none; cursor: pointer; font-size: 14px; padding: 10px 0; display: block; }
        .nav-links li.active a { color: white; border-bottom: 2px solid var(--accent-orange); }

        /* Profile Circle */
        .profile-circle { background: #2c3e50; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid var(--accent-orange); cursor: pointer; }

        /* Container & Cards */
        .main-container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: none; border-top: 5px solid var(--accent-orange); }
        .card.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #f8f9fa; padding: 12px; border-bottom: 2px solid #eee; color: #555; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .stat-box h4 { margin: 0 0 5px 0; color: #888; font-size: 12px; text-transform: uppercase; }
        .stat-box p { margin: 0; font-weight: bold; color: var(--nav-dark); }

        .logout-btn { background: none; border: 1px solid var(--accent-orange); color: var(--accent-orange); padding: 5px 15px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .logout-btn:hover { background: var(--accent-orange); color: white; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div style="display:flex; align-items:center; gap:20px;">
            <h2 style="color: var(--accent-orange); margin:0;">ZETECH</h2>
            <ul class="nav-links">
                <li id="li-home" class="active"><a onclick="showSec('home')">Home</a></li>
                <li id="li-results"><a onclick="showSec('results')">Results</a></li>
                <li id="li-fees"><a onclick="showSec('fees')">Finance</a></li>
            </ul>
        </div>
        <div style="display:flex; align-items:center; gap:15px;">
            <span id="userNameDisplay">Student Name</span>
            <div class="profile-circle" id="userInitial">??</div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main class="main-container">
        <section id="home" class="card active">
            <h2 id="welcomeMsg">Welcome!</h2>
            <div class="stat-grid">
                <div class="stat-box"><h4>Registration No.</h4><p id="p-reg">-</p></div>
                <div class="stat-box"><h4>Course</h4><p id="p-course">-</p></div>
                <div class="stat-box"><h4>Status</h4><p id="p-status" style="color: green;">Active</p></div>
            </div>
            <h3>My Details</h3>
            <p><strong>Email:</strong> <span id="p-email">-</span></p>
        </section>

        <section id="results" class="card">
            <h2>Academic Transcript</h2>
            <table id="resultsTable">
                <thead><tr><th>Unit Code</th><th>Score</th><th>Grade</th></tr></thead>
                <tbody id="marksBody">
                    </tbody>
            </table>
        </section>

        <section id="fees" class="card">
            <h2>Fee Statement</h2>
            <div style="background: #f9f9f9; padding: 20px; border-radius: 10px; border-left: 5px solid green;">
                <p>Total Paid: <strong id="paidAmount" style="color: green;">KES 0</strong></p>
                <p>Remaining Balance: <strong id="balanceAmount" style="color: red;">KES 0</strong></p>
            </div>
        </section>
    </main>

    <script>
        // 1. LOGIN SECURITY CHECK
        // We look for the email saved by portal.html
        const currentUserEmail = localStorage.getItem('currentUserEmail');
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        if (!isLoggedIn || !currentUserEmail) {
            window.location.href = "portal.html"; // Redirect to login if not authenticated
        }

        // 2. LOAD DATA
        function loadStudentData() {
            // Find the full student object from our main database
            const allStudents = JSON.parse(localStorage.getItem('db_students')) || [];
            const student = allStudents.find(s => s.email === currentUserEmail);

            if (!student) {
                alert("Student data not found!");
                logout();
                return;
            }

            // Update UI with student info
            document.getElementById('userNameDisplay').innerText = student.name;
            document.getElementById('userInitial').innerText = student.name.substring(0,2).toUpperCase();
            document.getElementById('welcomeMsg').innerText = `Welcome back, ${student.name.split(' ')[0]}!`;
            
            document.getElementById('p-reg').innerText = student.reg;
            document.getElementById('p-email').innerText = student.email;
            document.getElementById('p-course').innerText = student.course || "General Studies";

            // Fetch Marks (Results)
            const marks = JSON.parse(localStorage.getItem('db_marks')) || [];
            const myMarks = marks.filter(m => m.reg === student.reg);
            const marksBody = document.getElementById('marksBody');
            
            marksBody.innerHTML = ""; // Clear placeholder
            if(myMarks.length === 0) {
                marksBody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No results published yet.</td></tr>";
            } else {
                myMarks.forEach(m => {
                    const grade = getGradeLabel(m.score);
                    marksBody.innerHTML += `<tr><td>${m.code}</td><td>${m.score}%</td><td><strong>${grade}</strong></td></tr>`;
                });
            }

            // Fetch Fees (assuming fee set in admin is what we show)
            // Note: In your Admin, you might save fees differently, adjust key if needed
            const paid = parseFloat(student.fees) || 0; 
            const totalFee = 50000; // Fixed example fee
            const balance = totalFee - paid;

            document.getElementById('paidAmount').innerText = `KES ${paid.toLocaleString()}`;
            document.getElementById('balanceAmount').innerText = `KES ${balance.toLocaleString()}`;
        }

        function getGradeLabel(score) {
            if (score >= 70) return 'A';
            if (score >= 60) return 'B';
            if (score >= 50) return 'C';
            if (score >= 40) return 'D';
            return 'E';
        }

        function showSec(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-links li').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('li-' + id).classList.add('active');
        }

        function logout() {
            localStorage.removeItem("isLoggedIn");
            localStorage.removeItem("currentUserEmail");
            localStorage.removeItem("user_role");
            window.location.href = "portal.html";
        }

        // Run on load
        window.onload = loadStudentData;
    </script>
</body>
</html>
